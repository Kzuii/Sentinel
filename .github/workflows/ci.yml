name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        uses: CompeyDev/setup-aftman@v0.1.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Selene
        run: selene src/

      - name: Run StyLua check
        run: stylua --check src/ tests/

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Aftman
        uses: CompeyDev/setup-aftman@v0.1.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build place file with Rojo
        run: rojo build default.project.json -o test-place.rbxl

      - name: Run tests with run-in-roblox
        run: run-in-roblox --place test-place.rbxl --script ServerScriptService.Tests.bootstrap
